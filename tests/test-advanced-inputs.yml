name: Test advanced inputs coverage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          version: "6.8.3"
          host: linux
          target: desktop
          arch: gcc_64
          dir: ${{ runner.temp }}/qt-advanced
          modules: qtcharts qtmultimedia
          archives: qtbase
          tools: tools_ifw
          aqtsource: ''
          aqtversion: ==3.3.*
          py7zrversion: ==1.0.*
          extra: ''
          install-deps: true
          cache: false
          cache-key-prefix: install-qt-action
          setup-python: true
          add-tools-to-path: true
          set-env: true
          no-qt-binaries: false
          tools-only: false
          source: false
          src-archives: ''
          documentation: false
          doc-archives: ''
          doc-modules: ''
          examples: false
          example-archives: ''
          example-modules: ''
          use-official: false
          email: ''
          pw: ''
      - name: Assert Qt directory exists
        run: |
          echo "Checking Qt installation directory..."
          if [ ! -d "$RUNNER_TEMP/qt-advanced" ]; then
            echo "FAIL: Qt directory not found at $RUNNER_TEMP/qt-advanced"
            exit 1
          fi
          echo "PASS: Qt directory exists"
